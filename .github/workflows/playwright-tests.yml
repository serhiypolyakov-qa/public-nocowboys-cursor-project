name: Playwright Auto Tests

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      CUSTOMER_LOGIN_TEST_LOGIN: ${{ secrets.CUSTOMER_LOGIN_TEST_LOGIN }}
      CUSTOMER_LOGIN_TEST_PASSWORD: ${{ secrets.CUSTOMER_LOGIN_TEST_PASSWORD }}
      CUSTOMER_LOGIN_TEST_FULL_NAME: ${{ secrets.CUSTOMER_LOGIN_TEST_FULL_NAME }}
      BUSINESS_LOGIN_TEST_LOGIN: ${{ secrets.BUSINESS_LOGIN_TEST_LOGIN }}
      BUSINESS_LOGIN_TEST_PASSWORD: ${{ secrets.BUSINESS_LOGIN_TEST_PASSWORD }}
      BUSINESS_LOGIN_TEST_BUSINESS_NAME: ${{ secrets.BUSINESS_LOGIN_TEST_BUSINESS_NAME }}

    steps:

      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🌍 Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🚀 Run Playwright Tests
        run: npm run test
        continue-on-error: true

      - name: 📦 Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: 📥 Checkout gh-pages branch
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: 📊 Copy history
        if: always()
        run: |
          mkdir -p allure-results/history
          cp -r gh-pages/history allure-results || true

      - name: 📈 Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      - name: 🚀 Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
