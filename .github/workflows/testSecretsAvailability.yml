name: Test Secrets Availability

on:
  workflow_dispatch:  # можна запускати вручну

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    env:
      CUSTOMER_LOGIN_TEST_LOGIN: ${{ secrets.CUSTOMER_LOGIN_TEST_LOGIN }}
      CUSTOMER_LOGIN_TEST_PASSWORD: ${{ secrets.CUSTOMER_LOGIN_TEST_PASSWORD }}
      CUSTOMER_LOGIN_TEST_FULL_NAME: ${{ secrets.CUSTOMER_LOGIN_TEST_FULL_NAME }}
      BUSINESS_LOGIN_TEST_LOGIN: ${{ secrets.BUSINESS_LOGIN_TEST_LOGIN }}
      BUSINESS_LOGIN_TEST_PASSWORD: ${{ secrets.BUSINESS_LOGIN_TEST_PASSWORD }}
      BUSINESS_LOGIN_TEST_BUSINESS_NAME: ${{ secrets.BUSINESS_LOGIN_TEST_FULL_NAME }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Check secrets
        run: |
          echo "CUSTOMER_LOGIN_TEST_LOGIN is set: ${CUSTOMER_LOGIN_TEST_LOGIN:+yes}"
          echo "CUSTOMER_LOGIN_TEST_PASSWORD is set: ${CUSTOMER_LOGIN_TEST_PASSWORD:+yes}"
          echo "CUSTOMER_LOGIN_TEST_FULL_NAME is set: ${CUSTOMER_LOGIN_TEST_FULL_NAME:+yes}"
          echo "BUSINESS_LOGIN_TEST_LOGIN is set: ${BUSINESS_LOGIN_TEST_LOGIN:+yes}"
          echo "BUSINESS_LOGIN_TEST_PASSWORD is set: ${BUSINESS_LOGIN_TEST_PASSWORD:+yes}"
          echo "BUSINESS_LOGIN_TEST_FULL_NAME is set: ${BUSINESS_LOGIN_TEST_FULL_NAME:+yes}"
